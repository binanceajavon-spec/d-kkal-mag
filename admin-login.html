<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin - Newsflash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #cc0e37 0%, #e4101b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 mx-4">
    <div class="text-center mb-8">
      <img src="images/dekalé.png" alt="Logo" class="h-20 mx-auto mb-4">
      <h1 class="text-2xl font-bold text-gray-800">Administration</h1>
      <p class="text-gray-500 text-sm">Connectez-vous pour accéder au tableau de bord</p>
    </div>

    <form id="loginForm">
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
        <input type="email" id="email" required 
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-red-500">
      </div>
      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2">Mot de passe</label>
        <input type="password" id="password" required 
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-red-500">
      </div>
      <button type="submit" 
              class="w-full bg-red-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-700 transition">
        Se connecter
      </button>
    </form>

    <div id="errorMsg" class="mt-4 text-red-500 text-sm text-center hidden"></div>
  </div>

  <script>
    // Identifiants de connexion (à modifier par tes identifiants)
    const ADMIN_EMAIL = "admin@newsflash.com";
    const ADMIN_PASSWORD = "admin123";

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
        // Stocker la session admin
        localStorage.setItem('admin_logged_in', 'true');
        localStorage.setItem('admin_email', email);
        // Rediriger vers l'admin
        window.location.href = 'admin.html';
      } else {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = 'Email ou mot de passe incorrect';
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
